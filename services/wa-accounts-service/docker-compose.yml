services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8083}:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/${MONGO_DB:-wa-accounts}
      - INTEGRATION_SESSION_BASE_URL=${INTEGRATION_SESSION_BASE_URL:-http://host.docker.internal:8082}
      - INTEGRATION_SESSION_STUB_ENABLED=${INTEGRATION_SESSION_STUB_ENABLED:-true}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7.0
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
