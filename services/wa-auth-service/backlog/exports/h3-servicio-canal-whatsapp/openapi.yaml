        de términos.
      operationId: acceptTerms
      parameters:
      - name: id
        in: path
        description: Identificador del vínculo
        required: true
        schema:
          type: string
        example: 665f1a2b3c4d5e6f7a8b9c0d
      requestBody:
        description: Confirmación de aceptación de términos
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTermsRequestV1"
            examples:
              Aceptar términos:
                description: Aceptar términos
                value:
                  termsAccepted: true
        required: true
      responses:
        "400":
          description: Validación fallida o estado inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Estado inválido:
                  description: Estado inválido
                  value:
                    code: BAD_REQUEST
                    message: Cannot perform accept-terms when link status is ACTIVE
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
                Error de validación:
                  description: Error de validación
                  value:
                    code: VALIDATION_ERROR
                    message: Validation failed
