        "404":
          description: Vínculo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                No encontrado:
                  description: No encontrado
                  value:
                    code: NOT_FOUND
                    message: Channel link not found with id +541112345678
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
  /api/v1/channel-links/{id}/profile:
    get:
      tags:
      - Channel Links V1
      summary: F2 - Perfil del canal
      description: Perfil enmascarado sin datos legales sensibles (RN6).
      operationId: getProfile
      parameters:
      - name: id
        in: path
