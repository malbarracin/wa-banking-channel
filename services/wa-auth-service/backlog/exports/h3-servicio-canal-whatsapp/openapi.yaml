openapi: 3.0.1
info:
  title: WA Channel Service API
  description: Servicio de canal WhatsApp del ecosistema bancario WA
  contact:
    name: licius-it
    email: marceloalejandro.albarracin@gmail.com
  version: v1
servers:
- url: http://localhost:8081
  description: Generated server url
tags:
- name: Channel Links V1
  description: Operaciones de vínculo WhatsApp - API v1 (F1–F4)
paths:
  /api/v1/channel-links:
    post:
      tags:
      - Channel Links V1
      summary: F1 - Iniciar vínculo para número no vinculado
      description: Crea o reutiliza un registro de vínculo en estado NO_LINK. Rechaza
        números ya activos (RN1).
      operationId: initiateLink
      requestBody:
        description: Número WhatsApp a vincular
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateLinkRequestV1"
            examples:
              Iniciar vínculo:
                description: Iniciar vínculo
                value:
                  phoneNumber: "+541112345678"
        required: true
      responses:
        "201":
          description: Vínculo iniciado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponseV1"
              examples:
                Vínculo iniciado:
                  description: Vínculo iniciado
                  value:
                    id: 665f1a2b3c4d5e6f7a8b9c0d
                    phoneNumber: "+541112345678"
                    bankUserId: null
                    status: NO_LINK
                    identityVerified: false
                    termsAcceptedAt: null
                    verificationAttempts: 0
                    verificationBlockedUntil: null
                    createdAt: 2026-06-23T10:00:00Z
                    updatedAt: 2026-06-23T10:00:00Z
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Error interno:
                  description: Error interno
                  value:
                    code: INTERNAL_ERROR
                    message: An unexpected error occurred
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "400":
          description: Validación fallida o regla de negocio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Error de validación:
                  description: Error de validación
                  value:
                    code: VALIDATION_ERROR
                    message: Validation failed
                    details:
                    - "phoneNumber: phoneNumber is required"
                    timestamp: 2026-06-23T10:30:00Z
        "409":
          description: Número ya vinculado a cliente activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Duplicado activo:
                  description: Duplicado activo
                  value:
                    code: BAD_REQUEST
                    message: Phone number +541112345678 is already linked to an active
                      client
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
  /api/v1/channel-links/{id}/verify:
    post:
      tags:
      - Channel Links V1
      summary: F1 - Verificar identidad y consultar H1
      description: "Valida documento contra H1 (users-service), OTP MVP y marca identidad\
        \ verificada."
      operationId: verifyIdentity
      parameters:
      - name: id
        in: path
        description: Identificador del vínculo
        required: true
        schema:
          type: string
        example: 665f1a2b3c4d5e6f7a8b9c0d
      requestBody:
        description: Datos de verificación de identidad
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyIdentityRequestV1"
            examples:
              Verificar identidad:
                description: Verificar identidad
                value:
                  documentType: DNI
                  documentNumber: "12345678"
                  otpCode: "123456"
        required: true
      responses:
        "400":
          description: "Validación, usuario no elegible o estado inválido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Estado inválido:
                  description: Estado inválido
                  value:
                    code: BAD_REQUEST
                    message: Cannot perform accept-terms when link status is ACTIVE
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Error interno:
                  description: Error interno
                  value:
                    code: INTERNAL_ERROR
                    message: An unexpected error occurred
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "404":
          description: Vínculo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                No encontrado:
                  description: No encontrado
                  value:
                    code: NOT_FOUND
                    message: Channel link not found with id +541112345678
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "200":
          description: Verificación procesada (éxito o intento fallido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponseV1"
              examples:
                Identidad verificada:
                  description: Identidad verificada
                  value:
                    id: 665f1a2b3c4d5e6f7a8b9c0d
                    phoneNumber: "+541112345678"
                    bankUserId: user-bank-001
                    status: ACTIVE
                    identityVerified: true
                    termsAcceptedAt: 2026-06-23T10:05:00Z
                    verificationAttempts: 0
                    verificationBlockedUntil: null
                    createdAt: 2026-06-23T10:00:00Z
                    updatedAt: 2026-06-23T10:15:00Z
  /api/v1/channel-links/{id}/unlink:
    post:
      tags:
      - Channel Links V1
      summary: F3 - Desvincular número
      description: Desvincula el número WhatsApp y revoca credencial H2. Estado final
        UNLINKED.
      operationId: unlink
      parameters:
      - name: id
        in: path
        description: Identificador del vínculo
        required: true
        schema:
          type: string
        example: 665f1a2b3c4d5e6f7a8b9c0d
      requestBody:
        description: Confirmación explícita de desvinculación
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlinkRequestV1"
            examples:
              Confirmar desvinculación:
                description: Confirmar desvinculación
                value:
                  confirmed: true
        required: true
      responses:
        "400":
          description: Validación fallida o estado inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Estado inválido:
                  description: Estado inválido
                  value:
                    code: BAD_REQUEST
                    message: Cannot perform accept-terms when link status is ACTIVE
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "200":
          description: Número desvinculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponseV1"
              examples:
                Vínculo activo previo:
                  description: Vínculo activo previo
                  value:
                    id: 665f1a2b3c4d5e6f7a8b9c0d
                    phoneNumber: "+541112345678"
                    bankUserId: user-bank-001
                    status: ACTIVE
                    identityVerified: true
                    termsAcceptedAt: 2026-06-23T10:05:00Z
                    verificationAttempts: 0
                    verificationBlockedUntil: null
                    createdAt: 2026-06-23T10:00:00Z
                    updatedAt: 2026-06-23T10:15:00Z
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Error interno:
                  description: Error interno
                  value:
                    code: INTERNAL_ERROR
                    message: An unexpected error occurred
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "404":
          description: Vínculo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                No encontrado:
                  description: No encontrado
                  value:
                    code: NOT_FOUND
                    message: Channel link not found with id +541112345678
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
  /api/v1/channel-links/{id}/relink:
    post:
      tags:
      - Channel Links V1
      summary: F4 - Re-vinculación
      description: Inicia re-vinculación tras UNLINKED; exige nueva verificación completa
        (RN7).
      operationId: relink
      parameters:
      - name: id
        in: path
        description: Identificador del vínculo
        required: true
        schema:
          type: string
        example: 665f1a2b3c4d5e6f7a8b9c0d
      requestBody:
        description: Confirmación de inicio de re-vinculación
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelinkRequestV1"
            examples:
              Confirmar re-vinculación:
                description: Confirmar re-vinculación
                value:
                  confirmed: true
        required: true
      responses:
        "400":
          description: Validación fallida o estado inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Estado inválido:
                  description: Estado inválido
                  value:
                    code: BAD_REQUEST
                    message: Cannot perform accept-terms when link status is ACTIVE
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Error interno:
                  description: Error interno
                  value:
                    code: INTERNAL_ERROR
                    message: An unexpected error occurred
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "404":
          description: Vínculo no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                No encontrado:
                  description: No encontrado
                  value:
                    code: NOT_FOUND
                    message: Channel link not found with id +541112345678
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
        "200":
          description: Re-vinculación iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponseV1"
              examples:
                Pendiente verificación:
                  description: Pendiente verificación
                  value:
                    id: 665f1a2b3c4d5e6f7a8b9c0d
                    phoneNumber: "+541112345678"
                    bankUserId: null
                    status: PENDING_VERIFICATION
                    identityVerified: false
                    termsAcceptedAt: 2026-06-23T10:05:00Z
                    verificationAttempts: 0
                    verificationBlockedUntil: null
                    createdAt: 2026-06-23T10:00:00Z
                    updatedAt: 2026-06-23T10:05:00Z
  /api/v1/channel-links/{id}/complete-onboarding:
