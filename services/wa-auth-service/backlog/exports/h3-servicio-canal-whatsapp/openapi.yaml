                    message: Channel link not found with id +541112345678
                    details: []
                    timestamp: 2026-06-23T10:30:00Z
components:
  schemas:
    InitiateLinkRequestV1:
      required:
      - phoneNumber
      type: object
      properties:
        phoneNumber:
          pattern: "^\\+[1-9]\\d{6,14}$"
          type: string
          description: Número WhatsApp en formato E.164
          example: "+541112345678"
      description: Datos para iniciar vínculo de canal WhatsApp
    LinkResponseV1:
      type: object
      properties:
        id:
          type: string
          description: Identificador del vínculo
          example: 665f1a2b3c4d5e6f7a8b9c0d
        phoneNumber:
          type: string
          description: Número WhatsApp en formato E.164
          example: "+541112345678"
        bankUserId:
          type: string
          description: Identificador del usuario bancario vinculado
          example: user-bank-001
        status:
          type: string
          description: Estado operativo del vínculo
          example: ACTIVE
          enum:
          - NO_LINK
          - PENDING_VERIFICATION
          - VERIFICATION_FAILED
          - ACTIVE
          - BLOCKED
          - UNLINKED
        identityVerified:
          type: boolean
          description: Indica si la identidad fue verificada
        termsAcceptedAt:
          type: string
          description: Fecha de aceptación de términos
          format: date-time
        verificationAttempts:
          type: integer
          description: Intentos de verificación realizados
          format: int32
        verificationBlockedUntil:
          type: string
          description: Bloqueo temporal de verificación hasta
          format: date-time
        createdAt:
          type: string
          description: Fecha de creación
          format: date-time
        updatedAt:
          type: string
          description: Fecha de última actualización
          format: date-time
      description: Estado del vínculo de canal WhatsApp
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Código de error estandarizado
          example: VALIDATION_ERROR
          enum:
          - NOT_FOUND
          - VALIDATION_ERROR
          - BAD_REQUEST
          - INTERNAL_ERROR
        message:
          type: string
          description: Descripción legible del error
          example: Validation failed
        details:
          type: array
          description: Detalles adicionales (ej. errores de campo en validación)
          example:
          - "phoneNumber: phoneNumber is required"
          items:
            type: string
            description: Detalles adicionales (ej. errores de campo en validación)
            example: "[\"phoneNumber: phoneNumber is required\"]"
        timestamp:
          type: string
          description: Marca de tiempo ISO-8601
          format: date-time
          example: 2026-06-23T10:30:00Z
      description: Contrato unificado de respuesta de error
    VerifyIdentityRequestV1:
      required:
      - documentNumber
      - documentType
      - otpCode
      type: object
      properties:
        documentType:
          type: string
          description: Tipo de documento
          example: DNI
          enum:
          - DNI
          - LC
          - LE
          - PASSPORT
          - CUIT
        documentNumber:
          type: string
          description: Número de documento
          example: "12345678"
        otpCode:
          type: string
          description: Código OTP de verificación (MVP)
          example: "123456"
      description: Datos de verificación de identidad
    UnlinkRequestV1:
      required:
      - confirmed
      type: object
      properties:
        confirmed:
          type: boolean
          description: Confirmación explícita de desvinculación
          example: true
      description: Confirmación de desvinculación del canal
    RelinkRequestV1:
      required:
      - confirmed
      type: object
      properties:
        confirmed:
          type: boolean
          description: Confirmación de inicio de re-vinculación
          example: true
      description: Solicitud de re-vinculación con nueva verificación
    BlockLinkRequestV1:
      required:
      - confirmed
      type: object
      properties:
        confirmed:
          type: boolean
          description: Confirmación explícita de bloqueo
          example: true
      description: Confirmación de bloqueo del vínculo
    AcceptTermsRequestV1:
      required:
      - termsAccepted
      type: object
      properties:
        termsAccepted:
          type: boolean
          description: Confirmación de aceptación de términos
          example: true
      description: Aceptación explícita de términos del canal
    PreferencesRequestV1:
      type: object
      properties:
        language:
          type: string
          description: Idioma preferido
          example: es
        notificationsEnabled:
          type: boolean
          description: Notificaciones habilitadas
          example: true
        quietHoursStart:
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          type: string
          description: Inicio de horario silencioso (HH:mm)
          example: 22:00
        quietHoursEnd:
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          type: string
          description: Fin de horario silencioso (HH:mm)
          example: 08:00
      description: Actualización parcial de preferencias del canal
    PreferencesResponseV1:
      type: object
      properties:
        language:
          type: string
          description: Idioma preferido
          example: es
        notificationsEnabled:
          type: boolean
          description: Notificaciones habilitadas
          example: true
        quietHoursStart:
          type: string
          description: Inicio de horario silencioso (HH:mm)
          example: 22:00
        quietHoursEnd:
          type: string
          description: Fin de horario silencioso (HH:mm)
          example: 08:00
      description: Preferencias del canal WhatsApp
    ProfileResponseV1:
      type: object
      properties:
        linkId:
          type: string
          description: Identificador del vínculo
          example: 665f1a2b3c4d5e6f7a8b9c0d
        displayName:
          type: string
          description: Nombre para mostrar
          example: John Doe
        maskedEmail:
          type: string
          description: Correo electrónico enmascarado
          example: j***@example.com
        maskedPhone:
          type: string
          description: Teléfono de contacto enmascarado
          example: +5411****5678
        language:
          type: string
          description: Idioma preferido
          example: es
      description: Perfil del canal WhatsApp (sin datos legales sensibles)
    Pageable:
      type: object
      properties:
        page:
          minimum: 0
          type: integer
          format: int32
        size:
          minimum: 1
          type: integer
          format: int32
        sort:
          type: array
          items:
            type: string
    InteractionHistoryItemV1:
      type: object
      properties:
        id:
          type: string
          description: Identificador de la interacción
        type:
          type: string
          description: Tipo de interacción
          enum:
          - ONBOARDING_STARTED
          - TERMS_ACCEPTED
          - VERIFICATION
          - LINK_COMPLETED
          - PROFILE_VIEWED
          - PREFERENCES_UPDATED
          - BLOCKED
          - UNLINKED
          - RELINK_STARTED
        result:
          type: string
          description: Resultado de la interacción
          example: SUCCESS
        summary:
          type: string
          description: Resumen sin datos sensibles
        occurredAt:
          type: string
          description: Fecha de la interacción
          format: date-time
      description: Entrada del historial de interacciones
