  /api/v1/channel-links/by-phone/{phone}:
    get:
      tags:
      - Channel Links V1
      summary: F1 - Consulta estado de vínculo por número
      description: "Consulta anti-duplicado: retorna el vínculo existente para un\
        \ número E.164."
      operationId: findByPhone
      parameters:
      - name: phone
        in: path
        description: Número WhatsApp en formato E.164
        required: true
        schema:
          type: string
        example: "+541112345678"
      responses:
        "200":
          description: Vínculo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponseV1"
              examples:
                Vínculo activo:
                  description: Vínculo activo
                  value:
                    id: 665f1a2b3c4d5e6f7a8b9c0d
                    phoneNumber: "+541112345678"
                    bankUserId: user-bank-001
                    status: ACTIVE
                    identityVerified: true
                    termsAcceptedAt: 2026-06-23T10:05:00Z
                    verificationAttempts: 0
                    verificationBlockedUntil: null
                    createdAt: 2026-06-23T10:00:00Z
                    updatedAt: 2026-06-23T10:15:00Z
