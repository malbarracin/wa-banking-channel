spring:
  application:
    name: wa-auth-service
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: mongodb://localhost:27017/wa-auth

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
  health:
    mongo:
      enabled: true
    diskspace:
      enabled: true
      threshold: 10MB
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: full

info:
  app:
    name: ${spring.application.name}
    description: Servicio de acceso y sesión del ecosistema bancario WA
    version: '@project.version@'
    encoding: UTF-8
    java:
      version: ${java.version}
  contact:
    team: licius-it
    email: marceloalejandro.albarracin@gmail.com

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

api:
  versioning:
    enabled: true
    default-version: v1
    supported-versions:
      - v1

session:
  credential:
    ttl-hours: 24
    pepper: ${SESSION_PEPPER:change-me-in-production}

logging:
  level:
    root: INFO
    com.wa.banking.auth: DEBUG
